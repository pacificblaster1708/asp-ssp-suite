# CPU-runnable verification dataset (controlled ground truth). Not a benchmark.
dataset: synthetic
num_classes: 8
modality: points
n_points: 256
k_slices: 16
points_per_slice: 32
d_model: 128
enc_hidden: 64
d_ssp: 64
ssp_rank: 0
policy: ssp
use_mask: true
theta: 0.7
epochs: 30
lr: 1.0e-3
batch_size: 64
lambda_exit: 0.1
lambda_sparse: 0.01
tau_start: 1.0
tau_end: 0.5
eval_every: 5
seeds: [0, 1, 2, 3, 4]
